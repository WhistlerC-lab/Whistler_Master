<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHISTLER MASTER v1.0</title>
<style>
  :root {
    --bg0: #0a0c12; --bg1: #0f1117; --bg2: #161926; --bg3: #1e2438;
    --bd: #2a3050; --tx1: #e2e8f0; --tx2: #94a3b8; --tx3: #475569;
    --green: #4ade80; --red: #f87171; --gold: #fbbf24; --blue: #60a5fa;
    --cyan: #22d3ee; --purple: #a78bfa;
    --bull: #4ade80; --bear: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg0); color: var(--tx1); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; min-height: 100vh; }

  /* ── HEADER ── */
  .header { background: var(--bg2); border-bottom: 1px solid var(--bd); padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 15px; font-weight: 800; letter-spacing: .08em; color: var(--gold); }
  .logo span { color: var(--tx2); font-weight: 400; font-size: 12px; }
  .regime-pill { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .rp-bull { background: rgba(74,222,128,.15); color: var(--green); border: 1px solid rgba(74,222,128,.3); }
  .rp-bear { background: rgba(248,113,113,.15); color: var(--red);   border: 1px solid rgba(248,113,113,.3); }
  .rp-neut { background: rgba(148,163,184,.1);  color: var(--tx2);   border: 1px solid var(--bd); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .btn { background: var(--bg3); border: 1px solid var(--bd); color: var(--tx1); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all .2s; }
  .btn:hover { border-color: var(--blue); color: var(--blue); }
  .btn.run { background: rgba(96,165,250,.15); border-color: var(--blue); color: var(--blue); }
  .btn.stop { background: rgba(248,113,113,.15); border-color: var(--red); color: var(--red); }
  .btn.primary { background: rgba(74,222,128,.15); border-color: var(--green); color: var(--green); }

  /* ── LAYOUT ── */
  .main { display: grid; grid-template-columns: 300px 1fr; gap: 0; min-height: calc(100vh - 49px); }

  /* ── SIDEBAR ── */
  .sidebar { background: var(--bg1); border-right: 1px solid var(--bd); padding: 16px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
  .sidebar-section { background: var(--bg2); border: 1px solid var(--bd); border-radius: 8px; padding: 12px; }
  .sec-title { font-size: 10px; font-weight: 700; color: var(--tx3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }

  /* ── STATUS ── */
  .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--tx3); flex-shrink: 0; }
  .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── PROGRESS ── */
  .progress-bar { height: 4px; background: var(--bd); border-radius: 2px; overflow: hidden; margin: 4px 0; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .4s; }
  .progress-msg { font-size: 11px; color: var(--tx3); min-height: 16px; }

  /* ── REGIME BOX ── */
  .regime-box { text-align: center; padding: 8px 0; }
  .regime-score { font-size: 40px; font-weight: 800; line-height: 1; }
  .regime-label { font-size: 12px; margin-top: 4px; }
  .regime-detail { font-size: 11px; color: var(--tx3); margin-top: 8px; line-height: 1.7; }

  /* ── TG SETTINGS ── */
  .form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .form-row label { font-size: 11px; color: var(--tx3); }
  .form-row input { background: var(--bg3); border: 1px solid var(--bd); color: var(--tx1); padding: 5px 8px; border-radius: 5px; font-size: 12px; width: 100%; }
  .form-row input:focus { outline: none; border-color: var(--blue); }
  .tg-status { font-size: 11px; color: var(--tx3); margin-top: 6px; min-height: 16px; }
  .auto-row { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-top: 8px; }
  .auto-row input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; }
  select.form-select { background: var(--bg3); border: 1px solid var(--bd); color: var(--tx1); padding: 5px 8px; border-radius: 5px; font-size: 12px; width: 100%; }

  /* ── MAIN CONTENT ── */
  .content { padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }

  /* ── SECTION HEADER ── */
  .section-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .section-hd h2 { font-size: 12px; font-weight: 700; color: var(--tx2); letter-spacing: .08em; text-transform: uppercase; }
  .badge { background: var(--bg3); border: 1px solid var(--bd); border-radius: 4px; padding: 1px 6px; font-size: 10px; color: var(--tx3); }

  /* ── BTC/ETH CARDS ── */
  .macro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .macro-card { background: var(--bg2); border: 1px solid var(--bd); border-radius: 8px; padding: 14px; }
  .mc-sym { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
  .mc-price { font-size: 22px; font-weight: 700; }
  .mc-chg { font-size: 12px; margin-left: 6px; }
  .pos { color: var(--green); } .neg { color: var(--red); }
  .mc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
  .mc-stat { background: var(--bg3); border-radius: 5px; padding: 6px 8px; }
  .mc-stat-label { font-size: 10px; color: var(--tx3); }
  .mc-stat-val { font-size: 12px; font-weight: 600; margin-top: 2px; }

  /* ── CANDIDATE TABLE ── */
  .cand-table { width: 100%; border-collapse: collapse; }
  .cand-table th { font-size: 10px; color: var(--tx3); font-weight: 600; padding: 6px 8px; border-bottom: 1px solid var(--bd); text-align: left; letter-spacing: .06em; }
  .cand-table td { padding: 8px 8px; border-bottom: 1px solid rgba(42,48,80,.5); font-size: 12px; vertical-align: middle; }
  .cand-table tr:last-child td { border-bottom: none; }
  .cand-table tr:hover td { background: rgba(255,255,255,.02); }
  .sym-name { font-weight: 700; color: var(--tx1); }
  .score-bar-wrap { display: flex; align-items: center; gap: 6px; }
  .score-bar { height: 6px; border-radius: 3px; background: linear-gradient(90deg, var(--blue), var(--green)); }
  .score-num { font-size: 12px; font-weight: 700; min-width: 28px; }
  .tf-badges { display: flex; gap: 3px; flex-wrap: wrap; }
  .tf-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
  .tf-ok { background: rgba(74,222,128,.15); color: var(--green); border: 1px solid rgba(74,222,128,.3); }
  .tf-half { background: rgba(251,191,36,.1); color: var(--gold); border: 1px solid rgba(251,191,36,.25); }
  .tpsl-cell { font-size: 10px; line-height: 1.6; color: var(--tx2); }
  .tpsl-tp { color: var(--green); }
  .tpsl-sl { color: var(--red); }
  .rank-icon { font-size: 14px; min-width: 20px; }

  /* ── AI RESULT ── */
  .ai-result { background: var(--bg2); border: 1px solid rgba(167,139,250,.3); border-radius: 8px; padding: 14px; line-height: 1.7; color: var(--tx2); font-size: 13px; white-space: pre-wrap; }
  .ai-result.loading { color: var(--tx3); font-style: italic; }
  .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ai-icon { font-size: 16px; }

  /* ── NEXT SCAN ── */
  .next-scan { background: var(--bg2); border: 1px solid var(--bd); border-radius: 6px; padding: 8px 12px; font-size: 11px; color: var(--tx3); display: flex; align-items: center; gap: 8px; }
  .countdown-num { font-weight: 700; color: var(--blue); font-size: 13px; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 40px 20px; color: var(--tx3); }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  /* ── MODAL ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--bd); border-radius: 10px; padding: 20px; width: 400px; max-width: 90vw; }
  .modal-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
  .modal-close { float: right; cursor: pointer; color: var(--tx3); font-size: 18px; line-height: 1; }
  .modal-close:hover { color: var(--tx1); }

  /* ── LAST REPORT PREVIEW ── */
  .report-preview { background: var(--bg2); border: 1px solid var(--bd); border-radius: 8px; padding: 12px; font-size: 11px; color: var(--tx2); white-space: pre-wrap; max-height: 200px; overflow-y: auto; display: none; }
  .report-preview.show { display: block; }
  .log-box { background: var(--bg1); border: 1px solid var(--bd); border-radius: 6px; padding: 10px; font-size: 10px; color: var(--tx3); max-height: 120px; overflow-y: auto; font-family: monospace; }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
    .macro-grid { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--bd); }
  }
</style>
</head>

<script>
/* ═══════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════ */
const FAPI = 'https://fapi.binance.com';
const sleep = ms => new Promise(r => setTimeout(r, ms));
let running = false, stopFlag = false;
let autoTimer = null, countdownTimer = null, nextScanAt = 0;
let regimeScore = null;
let lastResults = [];

/* ═══════════════════════════════════════════
   LOGGING
═══════════════════════════════════════════ */
function log(msg) {
  const box = document.getElementById('logBox');
  if (!box) return;
  const kst = new Date(Date.now()+9*3600000).toISOString().slice(11,19);
  box.innerHTML = `<div>[${kst}] ${msg}</div>` + box.innerHTML;
  if (box.children.length > 50) box.removeChild(box.lastChild);
}

/* ═══════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════ */
function getApiKey() {
  function _dk() {
    const e = '1e0e711e3d670d1169162f3a0a3e3110362b116d6a051d066f1d723b66676c6c6772360f282d3a087267082b720b6e126b051a6c1e';
    return e.match(/.{2}/g).map(h => String.fromCharCode(parseInt(h, 16) ^ 0x5F)).join('');
  }
  return localStorage.getItem('wm_gemini_key') || _dk();
}
function isValidKey(k) { return k && k.length >= 20; }
function saveGeminiKey() {
  const k = document.getElementById('geminiKeyInput').value.trim();
  if (!isValidKey(k)) { document.getElementById('geminiTestResult').textContent = '⚠ 키가 너무 짧습니다'; return; }
  localStorage.setItem('wm_gemini_key', k);
  document.getElementById('geminiTestResult').textContent = '✅ 저장됨';
}
function openSettings() {
  document.getElementById('geminiKeyInput').value = localStorage.getItem('wm_gemini_key') || '';
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }
function saveTgSettings() {
  localStorage.setItem('wm_tg_token', document.getElementById('tgToken').value.trim());
  localStorage.setItem('wm_tg_chat',  document.getElementById('tgChat').value.trim());
  setTgStatus('✅ 저장됨', 'var(--green)');
}
function loadTgSettings() {
  const t = localStorage.getItem('wm_tg_token'); const c = localStorage.getItem('wm_tg_chat');
  if (t) document.getElementById('tgToken').value = t;
  if (c) document.getElementById('tgChat').value  = c;
  // defaults from Terminal v1.8
  if (!t) document.getElementById('tgToken').value = '8623987930:AAGAKiAwMVcpZFHZ8kJCUAXIuyESCkSGck0';
  if (!c) document.getElementById('tgChat').value  = '7151485201';
}
function setTgStatus(msg, color='var(--tx3)') {
  const el = document.getElementById('tgStatus');
  if (el) { el.textContent = msg; el.style.color = color; }
}
function toggleReport() {
  const el = document.getElementById('reportPreview');
  el.classList.toggle('show');
}

/* ═══════════════════════════════════════════
   NETWORK
═══════════════════════════════════════════ */
async function fetchJSON(url, retries = 3) {
  for (let a = 0; a <= retries; a++) {
    try {
      const res = await fetch(url);
      if (res.status === 429 || res.status === 418) {
        const ra = parseInt(res.headers.get('Retry-After')) || 0;
        await sleep(ra ? ra * 1000 : Math.min(1500 * (a+1), 8000));
        continue;
      }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    } catch(e) {
      if (a === retries) throw e;
      await sleep(700 * (a+1));
    }
  }
}

/* ═══════════════════════════════════════════
   TA LIBRARY
═══════════════════════════════════════════ */
const TA = {
  ema(a, n) {
    const r = new Array(a.length).fill(null);
    if (a.length < n) return r;
    const k = 2/(n+1); let s = 0;
    for (let i = 0; i < n; i++) s += a[i];
    let p = s/n; r[n-1] = p;
    for (let i = n; i < a.length; i++) { p = (a[i]-p)*k+p; r[i] = p; }
    return r;
  },
  sma(a, n) {
    const r = new Array(a.length).fill(null);
    if (a.length < n) return r;
    let s = 0; for (let i = 0; i < n; i++) s += a[i];
    r[n-1] = s/n;
    for (let i = n; i < a.length; i++) { s += a[i]-a[i-n]; r[i] = s/n; }
    return r;
  },
  stdev(a, n, sm) {
    const r = new Array(a.length).fill(null);
    for (let i = n-1; i < a.length; i++) {
      let v = 0; for (let j = 0; j < n; j++) v += (a[i-j]-sm[i])**2;
      r[i] = Math.sqrt(v/n);
    }
    return r;
  },
  rsi(c, n = 14) {
    const r = new Array(c.length).fill(null);
    if (c.length < n+1) return r;
    let gains = 0, losses = 0;
    for (let i = 1; i <= n; i++) {
      const d = c[i]-c[i-1];
      if (d > 0) gains += d; else losses -= d;
    }
    let ag = gains/n, al = losses/n;
    r[n] = al === 0 ? 100 : 100 - 100/(1 + ag/al);
    for (let i = n+1; i < c.length; i++) {
      const d = c[i]-c[i-1];
      ag = (ag*(n-1) + (d>0?d:0)) / n;
      al = (al*(n-1) + (d<0?-d:0)) / n;
      r[i] = al === 0 ? 100 : 100 - 100/(1 + ag/al);
    }
    return r;
  },
  macd(c, fast=12, slow=26, sig=9) {
    const eFast = this.ema(c, fast), eSlow = this.ema(c, slow);
    const macdLine = c.map((_, i) => eFast[i] !== null && eSlow[i] !== null ? eFast[i]-eSlow[i] : null);
    const validIdx = macdLine.findIndex(x => x !== null);
    const validMacd = macdLine.slice(validIdx);
    const sigRaw = this.ema(validMacd, sig);
    const signalLine = new Array(c.length).fill(null);
    sigRaw.forEach((v, i) => { if (v !== null) signalLine[validIdx+i] = v; });
    const hist = macdLine.map((m, i) => m !== null && signalLine[i] !== null ? m-signalLine[i] : null);
    return { macd: macdLine, signal: signalLine, hist };
  },
  atr(h, l, c, n = 14) {
    const r = new Array(c.length).fill(null);
    for (let i = 1; i < c.length; i++) {
      const tr = Math.max(h[i]-l[i], Math.abs(h[i]-c[i-1]), Math.abs(l[i]-c[i-1]));
      if (i < n) continue;
      let sum = 0; for (let j = i-n+1; j <= i; j++) { const t2 = Math.max(h[j]-l[j],Math.abs(h[j]-c[j-1]),Math.abs(l[j]-c[j-1])); sum+=t2; }
      r[i] = sum/n;
    }
    return r;
  }
};

/* ═══════════════════════════════════════════
   CANDLE PARSING
═══════════════════════════════════════════ */
const parseK = d => d.map(c => ({ o:+c[1], h:+c[2], l:+c[3], c:+c[4], v:+c[5], bv:+c[9] }));

/* ═══════════════════════════════════════════
   STAGE 1 FILTER  (Terminal v1.8 logic)
═══════════════════════════════════════════ */
function runStage1(candles) {
  if (!candles || candles.length < 210) return { stage1: false };
  const C=candles.map(x=>x.c), O=candles.map(x=>x.o), V=candles.map(x=>x.v), BV=candles.map(x=>x.bv);
  const ema12=TA.ema(C,12), ema25=TA.ema(C,25), ema50=TA.ema(C,50), ema200=TA.ema(C,200);
  let cSum=0;
  const cvd = BV.map((bv,i) => { cSum += bv-(V[i]-bv); return cSum; });
  const cvdEma = TA.ema(cvd, 10);
  const bbSma = TA.sma(C,20), bbStd = TA.stdev(C,20,bbSma);
  const bbw = bbSma.map((s,i) => s ? (4*bbStd[i])/s : 0);
  const bbwMa = TA.sma(bbw, 50);
  const i = C.length - 2;
  if (ema200[i] === null || bbwMa[i] === null) return { stage1: false };
  const p_sig = C[i]>ema12[i] && ema12[i]>ema25[i]*0.999 && C[i]>O[i];
  const ma_ok = ema50[i] > ema200[i];
  const cvd_rising = cvdEma[i] >= cvdEma[i-1] || cvdEma[i] > cvdEma[i-2];
  const bbw_ok = bbw[i] > bbwMa[i]*0.8;
  return { stage1: p_sig && ma_ok && cvd_rising, p_sig, ma_ok, cvd_rising, bbw_ok, ema50: ema50[i], ema200: ema200[i] };
}

/* ═══════════════════════════════════════════
   DIVERGENCE
═══════════════════════════════════════════ */
function findSwingLows(prices, lookback=3) {
  const pivots = [];
  for (let i = lookback; i < prices.length - lookback; i++) {
    let ok = true;
    for (let j = 1; j <= lookback; j++) { if (prices[i] >= prices[i-j] || prices[i] >= prices[i+j]) { ok=false; break; } }
    if (ok) pivots.push(i);
  }
  return pivots;
}
function findSwingHighs(prices, lookback=3) {
  const pivots = [];
  for (let i = lookback; i < prices.length - lookback; i++) {
    let ok = true;
    for (let j = 1; j <= lookback; j++) { if (prices[i] <= prices[i-j] || prices[i] <= prices[i+j]) { ok=false; break; } }
    if (ok) pivots.push(i);
  }
  return pivots;
}
function checkDivergence(prices, rsis, isBull) {
  const len = prices.length;
  if (len < 60) return false;
  const rp = prices.slice(len-80), rr = rsis.slice(len-80);
  const pivots = isBull ? findSwingLows(rp, 3) : findSwingHighs(rp, 3);
  if (pivots.length < 2) return false;
  const p2i = pivots[pivots.length-2], p1i = pivots[pivots.length-1];
  if (p1i < rp.length-20) return false;
  const pp2=rp[p2i], rr2=rr[p2i], pp1=rp[p1i], rr1=rr[p1i];
  if (rr2===null||rr1===null) return false;
  return isBull ? (pp1<pp2*0.997 && rr1>rr2+2) : (pp1>pp2*1.003 && rr1<rr2-2);
}

/* ═══════════════════════════════════════════
   EVALUATE TREND  (Swing v2.3 logic)
═══════════════════════════════════════════ */
function evaluateTrend(candles) {
  if (!candles || candles.length < 50) return null;
  const C=candles.map(x=>x.c), H=candles.map(x=>x.h), L=candles.map(x=>x.l), V=candles.map(x=>x.v), BV=candles.map(x=>x.bv);
  const e12=TA.ema(C,12), e50=TA.ema(C,50), e200=TA.ema(C,200);
  const rsi=TA.rsi(C,14), macd=TA.macd(C,12,26,9), atr=TA.atr(H,L,C,14);
  const sma20=TA.sma(C,20), stdev=TA.stdev(C,20,sma20);
  const bbw=stdev.map((s,idx)=>sma20[idx]?(s*4)/sma20[idx]:0);
  const bbwSma=TA.sma(bbw,20);
  let cSum=0;
  const cvd=BV.map((bv,idx)=>{cSum+=bv-(V[idx]-bv);return cSum;});
  const cvdEma=TA.ema(cvd,5);
  const bullDiv=checkDivergence(L,rsi,true), bearDiv=checkDivergence(H,rsi,false);
  const i=C.length-2;
  if (i<1) return null;
  return {
    c:C[i], e12:e12[i], e50:e50[i], e200:e200[i],
    rsi:rsi[i], atr:atr[i],
    macdHist:macd.hist[i], prevMacdHist:macd.hist[i-1],
    bbwExp:bbw[i]>bbwSma[i]&&bbw[i]>bbw[i-1],
    cvdCur:cvd[i], cvdPrev:cvd[i-1],
    cvdEmaCur:cvdEma[i], cvdEmaPrev:cvdEma[i-1],
    buyRatio:V[i]?BV[i]/V[i]:0.5,
    bullDiv, bearDiv
  };
}

/* ═══════════════════════════════════════════
   DEEP SCORE  (Swing v2.3 scoring)
═══════════════════════════════════════════ */
function deepScore(t1d, t4h, t1h, regScore) {
  if (!t1d && !t4h) return { lsc: 0, ssc: 0, l1d:0, l4h:0, l1h:0, s1d:0, s4h:0, s1h:0 };
  function scoreTf(t, weight) {
    if (!t) return { l: 0, s: 0 };
    let l = 0, s = 0;
    if (t.c > t.e200) l += weight*20; else s += weight*20;
    if (t.e50 > t.e200) l += weight*15; else s += weight*15;
    if (t.macdHist > 0 && t.macdHist > t.prevMacdHist) l += weight*15;
    else if (t.macdHist < 0 && t.macdHist < t.prevMacdHist) s += weight*15;
    if (t.rsi > 50 && t.rsi < 70) l += weight*10;
    else if (t.rsi < 50 && t.rsi > 30) s += weight*10;
    if (t.cvdEmaCur > t.cvdEmaPrev) l += weight*10; else s += weight*10;
    if (t.bullDiv) l += weight*15;
    if (t.bearDiv) s += weight*15;
    if (t.bbwExp) { l += weight*5; s += weight*5; }
    return { l, s };
  }
  const r1d = scoreTf(t1d, 1.0);
  const r4h = scoreTf(t4h, 0.7);
  const r1h = scoreTf(t1h, 0.4);
  let lsc = r1d.l + r4h.l + r1h.l;
  let ssc = r1d.s + r4h.s + r1h.s;
  if (regScore !== null) {
    if (regScore < -20) lsc -= 40;
    if (regScore > 20)  ssc -= 40;
  }
  return {
    lsc: Math.max(0, Math.round(lsc)),
    ssc: Math.max(0, Math.round(ssc)),
    l1d: Math.round(r1d.l), l4h: Math.round(r4h.l), l1h: Math.round(r1h.l),
    s1d: Math.round(r1d.s), s4h: Math.round(r4h.s), s1h: Math.round(r1h.s)
  };
}

/* ═══════════════════════════════════════════
   TP/SL CALCULATOR
═══════════════════════════════════════════ */
function calcTpSl(entry, atr, dir) {
  const sl  = dir==='long' ? entry-atr*1.5 : entry+atr*1.5;
  const tp1 = dir==='long' ? entry+atr*2.0 : entry-atr*2.0;
  const tp2 = dir==='long' ? entry+atr*3.5 : entry-atr*3.5;
  const rrr1 = (Math.abs(tp1-entry)/Math.abs(entry-sl)).toFixed(1);
  return { sl, tp1, tp2, rrr1 };
}

function fmtP(p) { return p>=1000?p.toFixed(1):p>=1?p.toFixed(3):p.toFixed(5); }
function pct(entry,target) { return ((Math.abs(target-entry)/entry)*100).toFixed(1)+'%'; }

/* ═══════════════════════════════════════════
   POSITIONING (Net Long / 계좌비율)  — Terminal v1.8 logic
═══════════════════════════════════════════ */
const POS_CFG = { TREND_WIN: 5, POS_LIMIT: 30, NETLONG_RISE: 0.005, ACCT_FALL: -0.005 };

function pctTrend(arr, win) {
  const v = arr.filter(x => x != null && isFinite(x));
  if (v.length < win*2) return null;
  const recent = v.slice(-win).reduce((s,x)=>s+x,0)/win;
  const earlier = v.slice(-win*2,-win).reduce((s,x)=>s+x,0)/win;
  if (!earlier) return null;
  return (recent-earlier)/Math.abs(earlier);
}

function checkPositioning(oiHist, posRatio, acctRatio) {
  let netlong_up=null, acct_down=null, netLongChg=null, acctChg=null;
  try {
    const oiVal=(oiHist||[]).map(x=>+x.sumOpenInterestValue);
    const longFrac=(posRatio||[]).map(x=>+x.longAccount);
    const n=Math.min(oiVal.length,longFrac.length);
    if (n>=POS_CFG.TREND_WIN*2) {
      const est=[];
      for (let k=0;k<n;k++) est.push(oiVal[oiVal.length-n+k]*longFrac[longFrac.length-n+k]);
      netLongChg=pctTrend(est,POS_CFG.TREND_WIN);
    }
    netlong_up = netLongChg==null ? null : netLongChg>POS_CFG.NETLONG_RISE;
    const lsr=(acctRatio||[]).map(x=>+x.longShortRatio);
    acctChg=pctTrend(lsr,POS_CFG.TREND_WIN);
    acct_down = acctChg==null ? null : acctChg<POS_CFG.ACCT_FALL;
  } catch(e){}
  return { netlong_up, acct_down, netLongChg, acctChg };
}

async function fetchPositioning(symbol, period='4h') {
  try {
    const [oiHist, posRatio, acctRatio] = await Promise.all([
      fetchJSON(`${FAPI}/futures/data/openInterestHist?symbol=${symbol}&period=${period}&limit=${POS_CFG.POS_LIMIT}`),
      fetchJSON(`${FAPI}/futures/data/topLongShortPositionRatio?symbol=${symbol}&period=${period}&limit=${POS_CFG.POS_LIMIT}`),
      fetchJSON(`${FAPI}/futures/data/globalLongShortAccountRatio?symbol=${symbol}&period=${period}&limit=${POS_CFG.POS_LIMIT}`)
    ]);
    return checkPositioning(oiHist, posRatio, acctRatio);
  } catch(e) { return { netlong_up:null, acct_down:null }; }
}

/* ═══════════════════════════════════════════
   STAGE 1 TF SCORING  (Terminal v1.8 logic)
═══════════════════════════════════════════ */
const TF_SCORE = { '1h':2, '4h':4 };
const TF_ALIGN = { '1h+4h':6 };

function calcTfScore(s1h, s4h) {
  let score = 0;
  if (s1h) score += TF_SCORE['1h'];
  if (s4h) score += TF_SCORE['4h'];
  if (s1h && s4h) score += TF_ALIGN['1h+4h'];
  return score;
}

/* ═══════════════════════════════════════════
   STAGE 2+3: SCAN COINS
═══════════════════════════════════════════ */
async function scanCoins() {
  setProgress(10, '바이낸스 티커 로딩 중...');
  const N = +document.getElementById('topN').value;
  const allTicker = await fetchJSON(`${FAPI}/fapi/v1/ticker/24hr`);
  const symbols = allTicker
    .filter(t => t.symbol.endsWith('USDT') && parseFloat(t.quoteVolume) > 1000000 && t.symbol !== 'BTCUSDT' && t.symbol !== 'ETHUSDT')
    .sort((a,b) => parseFloat(b.quoteVolume)-parseFloat(a.quoteVolume))
    .slice(0, N)
    .map(t => ({ sym: t.symbol, price: +t.lastPrice, chg: +t.priceChangePercent }));

  const BATCH = 4;
  let done = 0;
  const passed = [];

  for (let i = 0; i < symbols.length && !stopFlag; i += BATCH) {
    const batch = symbols.slice(i, i+BATCH);
    await Promise.all(batch.map(async ({ sym, price, chg }) => {
      try {
        const [k1h, k4h] = await Promise.all([
          fetchJSON(`${FAPI}/fapi/v1/klines?symbol=${sym}&interval=1h&limit=220`),
          fetchJSON(`${FAPI}/fapi/v1/klines?symbol=${sym}&interval=4h&limit=220`)
        ]);
        const tf1h = runStage1(parseK(k1h));
        const tf4h = runStage1(parseK(k4h));
        if (!tf1h.stage1 && !tf4h.stage1) return; // 둘 다 탈락
        passed.push({ sym, price, chg, k1h, k4h, tf1h, tf4h });
      } catch(e) {}
    }));
    done += batch.length;
    setProgress(10 + (done/symbols.length)*40, `1차 필터: ${done}/${symbols.length} — 통과 ${passed.length}개`);
    await sleep(300);
  }

  log(`1차 필터 완료: ${passed.length}/${symbols.length}개 통과`);
  if (stopFlag) return [];

  // Stage 3: Deep score for passed coins
  setProgress(50, '심층 스코어링 중...');
  const results = [];

  for (let i = 0; i < passed.length && !stopFlag; i += BATCH) {
    const batch = passed.slice(i, i+BATCH);
    await Promise.all(batch.map(async ({ sym, price, chg, k1h, k4h, tf1h, tf4h }) => {
      try {
        const [k1d, pos] = await Promise.all([
          fetchJSON(`${FAPI}/fapi/v1/klines?symbol=${sym}&interval=1d&limit=300`),
          fetchPositioning(sym, '4h')
        ]);
        const c1d = parseK(k1d), c1h = parseK(k1h), c4h = parseK(k4h);
        const t1d = evaluateTrend(c1d), t4h = evaluateTrend(c4h), t1h = evaluateTrend(c1h);
        const sc = deepScore(t1d, t4h, t1h, regimeScore);
        const tfScore = calcTfScore(tf1h.stage1, tf4h.stage1);

        // 포지셔닝 보너스 — 스마트머니 다이버전스 (Net Long↑ + 계좌비율↓)
        let posBonus = 0;
        if (pos.netlong_up && pos.acct_down) posBonus = 25;       // 완전 다이버전스 — 큰손 매집 + 개미 이탈
        else if (pos.netlong_up) posBonus = 10;                    // 큰손 매집만
        else if (pos.acct_down)  posBonus = 5;                     // 개미 이탈만

        const lscAdj = sc.lsc + posBonus;
        const finalScore = Math.round(lscAdj * 0.7 + tfScore * 3);
        const atr1d = t1d?.atr || 0;
        const tpsl = atr1d > 0 ? calcTpSl(price, atr1d, 'long') : null;
        results.push({ sym, price, chg, lsc: lscAdj, ssc: sc.ssc, finalScore, tfScore, posBonus, pos, tf1h: tf1h.stage1, tf4h: tf4h.stage1, t1h, t4h, t1d, atr1d, tpsl });
      } catch(e) {}
    }));
    setProgress(50 + ((i+BATCH)/passed.length)*35, `심층 분석: ${Math.min(i+BATCH, passed.length)}/${passed.length}`);
    await sleep(400);
  }

  results.sort((a,b) => b.finalScore - a.finalScore);
  log(`심층 분석 완료: 롱 후보 ${results.filter(r=>r.lsc>30).length}개`);
  return results;
}

          <div class="mc-stat"><div class="mc-stat-label">MACD</div><div class="mc-stat-val" style="color:${t?.macdHist>0?'var(--green)':'var(--red)'}">${t?.macdHist>0?'양(↑)':'음(↓)'}</div></div>
          ${tpsl?`<div class="mc-stat"><div class="mc-stat-label">TP1</div><div class="mc-stat-val tpsl-tp">$${fmtP(tpsl.tp1)} (+${pct(price,tpsl.tp1)})</div></div><div class="mc-stat"><div class="mc-stat-label">SL</div><div class="mc-stat-val tpsl-sl">$${fmtP(tpsl.sl)} (−${pct(price,tpsl.sl)})</div></div>`:''}
        </div>
      </div>`;
    }));
    document.getElementById('macroGrid').innerHTML = cards.join('');
    document.getElementById('macroTime').textContent = new Date().toLocaleTimeString('ko');
    return coins.map((c,i) => ({ sym:c.sym, price:+c.ticker.lastPrice, chg:+c.ticker.priceChangePercent }));
  } catch(e) { log('BTC/ETH 로딩 오류: '+e.message); return []; }
}

/* ═══════════════════════════════════════════
   GEMINI AI SUMMARY
═══════════════════════════════════════════ */
async function generateAISummary(regimeData, macroCoins, topCandidates) {
  const el = document.getElementById('aiResult');
  el.className = 'ai-result loading';
  el.textContent = '🤖 Gemini AI 종합 결론 생성 중...';

  if (!isValidKey(getApiKey())) {
    el.textContent = '⚠ Gemini API 키가 설정되지 않았습니다. ⚙️ 설정에서 키를 등록해주세요.';
    return '';
  }

  const top5 = topCandidates.filter(r=>r.lsc>10).slice(0,5);
  const regLabel = regimeData ? (regimeData.score<=-30?'하락장(BEAR)':regimeData.score>=30?'상승장(BULL)':'박스권(NEUTRAL)') : '불명';
  const candLines = top5.map((r,i) => {
    const posTxt = r.posBonus>=25 ? '🐳매집+개미이탈(강한 다이버전스)' : r.pos?.netlong_up ? '🐳큰손 매집중' : r.pos?.acct_down ? '👤개미 이탈중' : '포지셔닝 중립';
    return `${i+1}. ${r.sym.replace('USDT','')} — 점수:${r.finalScore}pt | RSI:${r.t1d?.rsi?.toFixed(1)||'?'} | ${r.tf1h?'1H✅':'1H❌'} ${r.tf4h?'4H✅':'4H❌'} | ${posTxt} | TP1:+${r.tpsl?pct(r.price,r.tpsl.tp1):'?'} SL:-${r.tpsl?pct(r.price,r.tpsl.sl):'?'}`;
  }).join('\n');

  const btcInfo = macroCoins.find(c=>c.sym==='BTC');
  const ethInfo = macroCoins.find(c=>c.sym==='ETH');

  const prompt = `당신은 가상화폐 스윙트레이딩 전문 애널리스트입니다. 아래 데이터를 분석해서 한국어로 간결하게 종합 결론을 작성해주세요.

## 시장 레짐
- BTC 레짐 점수: ${regimeData?.score||0} / 100 (${regLabel})
- BTC RSI(1D): ${regimeData?.rsi?.toFixed(1)||'?'}, MACD: ${regimeData?.macdHist>0?'양(상승)':'음(하락)'}
- 공포탐욕지수: ${regimeData?.fng||'?'}, 펀딩비: ${regimeData?.funding?(regimeData.funding*100).toFixed(4)+'%':'?'}

## BTC / ETH 현황
- BTC: $${btcInfo?fmtP(btcInfo.price):'?'} (${btcInfo?.chg>=0?'+':''}${btcInfo?.chg?.toFixed(2)||'?'}%)
- ETH: $${ethInfo?fmtP(ethInfo.price):'?'} (${ethInfo?.chg>=0?'+':''}${ethInfo?.chg?.toFixed(2)||'?'}%)

## 롱 후보 TOP ${top5.length}
${candLines || '없음'}

## 요청
다음 3가지를 각각 2~3문장으로 작성해주세요:
1. 📊 현재 시장 종합 판단 (지금 공격적으로 들어갈 때인지, 관망해야 하는지)
2. ₿ BTC/ETH 단기 방향성 및 주의 포인트
3. 🎯 가장 유망한 롱 진입 후보 1~2개와 그 이유 (없으면 '진입 보류' 명시)`;

  const result = await callGemini(prompt);
  el.className = 'ai-result';
  el.textContent = result || '분석 실패';
  return result || '';
}

/* ═══════════════════════════════════════════
   GEMINI API CALL
═══════════════════════════════════════════ */
async function callGemini(userPrompt) {
  const key = getApiKey();
  if (!isValidKey(key)) return null;
  const savedModel = localStorage.getItem('wm_gemini_model');
  const FALLBACK = ['gemini-2.5-flash','gemini-2.0-flash','gemini-2.5-flash-preview-05-20','gemini-2.0-flash-lite','gemini-1.5-flash','gemini-1.5-flash-8b'];
  const MODELS = savedModel ? [savedModel, ...FALLBACK.filter(m=>m!==savedModel)] : FALLBACK;
  const payload = {
    contents: [{ parts: [{ text: userPrompt }] }],
    systemInstruction: { parts: [{ text: "당신은 가상화폐 스윙 트레이딩 전문 애널리스트입니다. 전문적이고 직관적인 한국어로 답변하며, 요점만 간결하게 설명합니다." }] }
  };
  for (const model of MODELS) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
    let attempt = 0;
    while (attempt < 2) {
      attempt++;
      try {
        const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        if (res.ok) {
          const data = await res.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          localStorage.setItem('wm_gemini_model', model);
          log(`Gemini ✅ ${model}`);
          return text || '응답 없음';
        }
        const errData = await res.json().catch(()=>({}));
        const errMsg = errData?.error?.message || `HTTP ${res.status}`;
        log(`Gemini ${model} ${res.status}: ${errMsg.slice(0,60)}`);
        if (res.status===401||res.status===403) return `❌ API 키 오류: ${errMsg}`;
        if (res.status===429) { if (attempt<2) { await sleep(22000); continue; } break; }
        if (res.status===404||res.status===503) break;
        return `❌ API 오류 (${res.status})`;
      } catch(e) { return `❌ 네트워크 오류: ${e.message}`; }
    }
  }
  return '⏳ 모든 모델 한도 초과 — 잠시 후 재시도';
}

async function testGeminiKey() {
  const el = document.getElementById('geminiTestResult');
  el.textContent = '테스트 중...'; el.style.color = 'var(--tx3)';
  const result = await callGemini('안녕하세요. 짧게 "연결 성공"이라고만 답해주세요.');
  const isError = !result || result.startsWith('❌') || result.startsWith('⏳') || result.startsWith('⚠');
  if (!isError) {
    el.textContent = '✅ 연결 성공 (사용 모델: ' + (localStorage.getItem('wm_gemini_model') || '?') + ')';
    el.style.color = 'var(--green)';
  } else {
    el.textContent = result || '❌ 실패';
    el.style.color = 'var(--red)';
  }
}

/* ═══════════════════════════════════════════
   TELEGRAM
═══════════════════════════════════════════ */
async function sendTelegram(text) {
  const token = document.getElementById('tgToken').value.trim();
  const chat  = document.getElementById('tgChat').value.trim();
  if (!token || !chat) { setTgStatus('⚠ 토큰/Chat ID 누락', 'var(--gold)'); return false; }
  try {
    const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id:chat, text, parse_mode:'HTML', disable_web_page_preview:true })
    });
    if (res.ok) { setTgStatus('✅ 전송 완료', 'var(--green)'); return true; }
    const j = await res.json();
    setTgStatus('❌ '+j.description, 'var(--red)'); return false;
  } catch(e) { setTgStatus('❌ 네트워크 오류', 'var(--red)'); return false; }
}

async function testTelegram() {
  setTgStatus('전송 중...');
  const kst=new Date(Date.now()+9*3600000).toISOString().replace('T',' ').slice(0,16);
  await sendTelegram(`✅ WHISTLER MASTER 연결 테스트\n${kst} KST\n정상 작동 중입니다.`);
}

/* ═══════════════════════════════════════════
   BUILD & SEND REPORT
═══════════════════════════════════════════ */
function buildReport(regimeData, macroCoins, topCandidates, aiSummary) {
  const kst=new Date(Date.now()+9*3600000).toISOString().replace('T',' ').slice(0,16);
  const regLabel=regimeData?(regimeData.score<=-30?'🔴 하락장':regimeData.score>=30?'🟢 상승장':'⚪ 박스권'):'—';
  const btc=macroCoins.find(c=>c.sym==='BTC');
  const eth=macroCoins.find(c=>c.sym==='ETH');
  const top5=topCandidates.filter(r=>r.lsc>10).slice(0,5);
  const icons=['👑','🔥','🔥','🔔','🔔'];

  let msg = `<b>🏔 WHISTLER MASTER</b>  ${kst} KST\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n`;
  msg += `\n📊 <b>시장 레짐</b>: ${regLabel} (${regimeData?.score||0}pt)\n`;
  if (btc) msg += `₿ BTC $${fmtP(btc.price)}  ${btc.chg>=0?'+':''}${btc.chg.toFixed(2)}%\n`;
  if (eth) msg += `Ξ ETH $${fmtP(eth.price)}  ${eth.chg>=0?'+':''}${eth.chg.toFixed(2)}%\n`;
  msg += `\n`;

  if (top5.length) {
    msg += `🎯 <b>롱 후보 TOP ${top5.length}</b>\n<code>`;
    top5.forEach((r,i) => {
      const sym = r.sym.replace('USDT','').padEnd(8);
      const sc  = String(r.finalScore).padStart(3)+'pt';
      const tf  = (r.tf1h?'1H✅':'   ') + ' ' + (r.tf4h?'4H✅':'   ');
      const tpLine = r.tpsl ? `TP+${pct(r.price,r.tpsl.tp1)} SL-${pct(r.price,r.tpsl.sl)}` : '';
      msg += `${icons[i]||'•'} ${sym} ${sc}  ${tf}  ${tpLine}\n`;
    });
    msg += `</code>\n`;
  } else {
    msg += `🎯 <b>롱 후보</b>: 현재 조건 충족 없음\n`;
  }

  if (aiSummary) {
    msg += `\n🤖 <b>AI 종합 결론</b>\n${aiSummary.slice(0,600)}`;
    if (aiSummary.length > 600) msg += '…';
    msg += '\n';
  }

  const intervalMin = document.getElementById('scanInterval').value;
  msg += `\n⏰ 다음 스캔: ${intervalMin}분 후`;
  return msg;
}

async function sendReport(regimeData, macroCoins, topCandidates, aiSummary) {
  if (!document.getElementById('tgAutoCb').checked) return;
  const msg = buildReport(regimeData, macroCoins, topCandidates, aiSummary);
  document.getElementById('reportPreview').textContent = msg;
  document.getElementById('reportPreview').classList.add('show');
  await sendTelegram(msg);
}

function setProgress(pct, msg) {
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pMsg').textContent = msg;

/* ═══════════════════════════════════════════
   MAIN SCAN CYCLE
═══════════════════════════════════════════ */
async function runScan() {
  if (running) return;
  running = true; stopFlag = false;
  document.getElementById('scanDot').classList.add('on');
  document.getElementById('scanStatusText').textContent = '스캔 중...';
  document.getElementById('startBtn').classList.add('run');
  log('═══ 스캔 시작 ═══');

  let regimeData = null, macroCoins = [], topCandidates = [], aiSummary = '';

  try {
    // Stage 1: Regime
    setProgress(2, 'BTC 시장 레짐 분석 중...');
    regimeData = await loadRegime();
    if (stopFlag) return;

    // BTC/ETH macro
    setProgress(8, 'BTC/ETH 데이터 로딩 중...');
    macroCoins = await loadMacro();
    if (stopFlag) return;

    // Stage 2+3: Scan & Score
    topCandidates = await scanCoins();
    if (stopFlag) return;
    renderCandidates(topCandidates);

    // Stage 4: AI Summary
    setProgress(87, 'Gemini AI 결론 생성 중...');
    aiSummary = await generateAISummary(regimeData, macroCoins, topCandidates);
    if (stopFlag) return;

    // Stage 5: Telegram
    setProgress(96, '텔레그램 발송 중...');
    await sendReport(regimeData, macroCoins, topCandidates, aiSummary);

    setProgress(100, '스캔 완료 ✅');
    document.getElementById('lastScanTime').textContent = new Date().toLocaleTimeString('ko');
    log('═══ 스캔 완료 ═══');

  } catch(e) {
    setProgress(0, '오류 발생: ' + e.message);
    log('오류: ' + e.message);
  } finally {
    running = false;
    document.getElementById('scanDot').classList.remove('on');
    document.getElementById('scanStatusText').textContent = '대기 중';
    document.getElementById('startBtn').classList.remove('run');
  }
}

/* ═══════════════════════════════════════════
   AUTO SCAN TIMER
═══════════════════════════════════════════ */
function toggleAuto() {
  const cb = document.getElementById('autoScanCb');
  cb.checked = !cb.checked;
  if (cb.checked) {
    startAutoScan();
  } else {
    stopAutoScan();
  }
}

function startAutoScan() {
  document.getElementById('autoScanCb').checked = true;
  document.getElementById('startBtn').textContent = '⏸ 자동 스캔 중';
  document.getElementById('startBtn').classList.add('run');
  document.getElementById('stopBtn').style.display = 'flex';
  document.getElementById('nextScanRow').style.display = 'flex';
  runScan().then(() => scheduleNext());
}

function scheduleNext() {
  if (!document.getElementById('autoScanCb').checked) return;
  const intervalMin = +document.getElementById('scanInterval').value;
  nextScanAt = Date.now() + intervalMin * 60 * 1000;
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    const remaining = nextScanAt - Date.now();
    if (remaining <= 0) {
      clearInterval(countdownTimer);
      document.getElementById('countdownDisplay').textContent = '실행 중...';
      runScan().then(() => scheduleNext());
    } else {
      const m = Math.floor(remaining/60000), s = Math.floor((remaining%60000)/1000);
      document.getElementById('countdownDisplay').textContent = `${m}분 ${s}초`;
    }
  }, 1000);
}

function stopAutoScan() {
  document.getElementById('autoScanCb').checked = false;
  document.getElementById('startBtn').textContent = '▶ 자동 스캔 시작';
  document.getElementById('startBtn').classList.remove('run');
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('nextScanRow').style.display = 'none';
  if (countdownTimer) clearInterval(countdownTimer);
  stopFlag = true;
}

function stopScan() { stopFlag = true; stopAutoScan(); }
